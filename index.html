<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Página Nossa Escola</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="cabecalho-itens">
            <div class="cabecalho-imagem">
                <img src="img/logo.png" alt="Logo da Escola">
            </div>
            <div class="titulo_site">
                <h1>Nossa Escola</h1>
            </div>
            <div class="socials">
                <a class="link" href="#">Facebook</a>
                <a class="link" href="#">Instagram</a>
            </div>
        </div>
    </header>

    <section class="banner">
        <img src="img/banner.jpg" alt="Banner da Escola">
    </section>

    <section class="estudantes-todos">
        <div class="estudante-div">
            <img class="estudante-imagem" src="img/estudante1.png" alt="Foto Estudante">
            <h3 class="estudante-nome">Maria Silva</h3>
        </div>
        <!-- Repita esse bloco para outros estudantes -->
    </section>

    <section class="escola">
        <h2 class="escola-titulo">Sobre a Escola</h2>
        <p>Texto explicando a história e missão da escola.</p>
    </section>

    <footer>
        <img class="logo_rodape" src="img/logo.png" alt="Logo Rodapé">
        <p>&copy; 2026 Nossa Escola</p>
    </footer>
</body>
</html>
